<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniRAFT Dashboard</title>
  <meta name="description" content="A real-time, fault-tolerant whiteboard powered by the MiniRAFT consensus protocol.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Global Toast Notifications Container -->
  <div id="toast-container"></div>
  
  <!-- Left Sidebar: Cluster State Dashboard -->
  <div id="sidebar" class="glass-panel">
    
    <div class="header-section">
      <h1>MiniRAFT Cluster</h1>
      <div class="status-row">
        <div id="connection-badge" class="status-badge no-leader">
          <div class="indicator"></div> Booting Network...
        </div>
      </div>
    </div>
    
    <div class="dashboard-section">
      <div class="dashboard-title">Live Replica Status</div>
      
      <div class="nodes-container">
        <!-- Node r1 -->
        <div class="node-card offline" id="node-r1">
          <div class="node-header">
            <span class="node-id">replica-1</span>
            <span class="node-role">OFFLINE</span>
          </div>
          <div class="node-stats">
            <div class="stat-box">
              <div class="stat-label">Term</div>
              <div class="stat-value stat-term">-</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Log Size</div>
              <div class="stat-value stat-log">-</div>
            </div>
          </div>
        </div>

        <!-- Node r2 -->
        <div class="node-card offline" id="node-r2">
          <div class="node-header">
            <span class="node-id">replica-2</span>
            <span class="node-role">OFFLINE</span>
          </div>
          <div class="node-stats">
            <div class="stat-box">
              <div class="stat-label">Term</div>
              <div class="stat-value stat-term">-</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Log Size</div>
              <div class="stat-value stat-log">-</div>
            </div>
          </div>
        </div>

        <!-- Node r3 -->
        <div class="node-card offline" id="node-r3">
          <div class="node-header">
            <span class="node-id">replica-3</span>
            <span class="node-role">OFFLINE</span>
          </div>
          <div class="node-stats">
            <div class="stat-box">
              <div class="stat-label">Term</div>
              <div class="stat-value stat-term">-</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Log Size</div>
              <div class="stat-value stat-log">-</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Live Terminal for WS events -->
      <div class="dashboard-title" style="margin-top: 8px;">Gateway Event Log</div>
      <div class="log-terminal" id="gateway-log">
        <div class="log-line">> Initiating connection sequence...</div>
      </div>
      
    </div>
  </div>

  <!-- Main Canvas Workspace -->
  <div id="main-area">
    
    <div id="canvas-container">
      <!-- High performance vanilla canvas -->
      <canvas id="canvas"></canvas>
    </div>
    
    <!-- Floating Tool Dock -->
    <div id="dock-wrapper">
      <div id="dock">
        <div class="color-picker">
          <div class="color-btn active" style="background:#1d1d1d" data-color="#1d1d1d"></div>
          <div class="color-btn" style="background:#ef4444" data-color="#ef4444"></div>
          <div class="color-btn" style="background:#3b82f6" data-color="#3b82f6"></div>
          <div class="color-btn" style="background:#10b981" data-color="#10b981"></div>
          <div class="color-btn" style="background:#f59e0b" data-color="#f59e0b"></div>
          <div class="color-btn" style="background:#8b5cf6" data-color="#8b5cf6"></div>
        </div>
        
        <div class="divider"></div>
        
        <div id="dock-stats">Strokes: 0</div>
        
        <div class="divider"></div>
        
        <button id="undo-btn" class="action-btn" title="Undo (Cmd+Z)">↩ Undo</button>
        <button id="redo-btn" class="action-btn" title="Redo (Cmd+Shift+Z)">↪ Redo</button>
        <button id="clear-btn" class="action-btn error-btn">Clear Canvas</button>
      </div>
    </div>

  </div>

  <!-- Core Logic separated from views -->
  <script src="app.js"></script>
</body>
</html>
