version: '3.9'

networks:
  raft-net:
    driver: bridge

services:

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "3000:3000"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    environment:
      PORT: 3000
      REPLICAS: http://replica1:3001,http://replica2:3002,http://replica3:3003
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3
    restart: unless-stopped

  replica1:
    build: ./replica1
    container_name: replica1
    ports:
      - "3001:3001"
    volumes:
      - ./replica1:/app
      - /app/node_modules
    environment:
      PORT: 3001
      REPLICA_ID: r1
      PEERS: http://replica2:3002,http://replica3:3003
    networks:
      - raft-net
    restart: unless-stopped

  replica2:
    build: ./replica2
    container_name: replica2
    ports:
      - "3002:3002"
    volumes:
      - ./replica2:/app
      - /app/node_modules
    environment:
      PORT: 3002
      REPLICA_ID: r2
      PEERS: http://replica1:3001,http://replica3:3003
    networks:
      - raft-net
    restart: unless-stopped

  replica3:
    build: ./replica3
    container_name: replica3
    ports:
      - "3003:3003"
    volumes:
      - ./replica3:/app
      - /app/node_modules
    environment:
      PORT: 3003
      REPLICA_ID: r3
      PEERS: http://replica1:3001,http://replica2:3002
    networks:
      - raft-net
    restart: unless-stopped