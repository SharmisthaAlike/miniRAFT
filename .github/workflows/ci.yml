name: MiniRAFT CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Start Docker Compose services
      run: docker-compose up -d

    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to spin up..."
        sleep 10
        # Wait up to 30s for the gateway to be fully ready
        timeout 30 bash -c 'until curl -s http://localhost:3000/status; do sleep 2; done'
        echo "Gateway is ready! Waiting for leader election..."
        sleep 5

    - name: Run Integration Tests
      run: npm test

    - name: Stop Docker Compose services
      if: always()
      run: docker-compose down
